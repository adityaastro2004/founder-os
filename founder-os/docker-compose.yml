services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: founder-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: founder
      POSTGRES_PASSWORD: founder
      POSTGRES_DB: founder_os
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U founder -d founder_os"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: founder-os-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
