name: Deploy

# CD: deploys the backend to the EC2 host after CI succeeds on `main`.
#
# Transport: AWS SSM RunCommand authorized via GitHub OIDC — CD itself uses no
# SSH keys and no long-lived AWS keys in secrets. (The instance does accept SSH
# on port 22 for manual founder ops with the EC2 key pair; that path is outside
# CD.) The workflow assumes AWS_DEPLOY_ROLE_ARN, whose trust policy is scoped to
# this repo's main branch through the token.actions.githubusercontent.com
# identity provider — note the sub claim uses the immutable-ID form
# (repo:owner@<id>/name@<id>:ref:…), so the trust condition must match that.
#
# The on-server steps (deps, alembic, restart, health check, rollback) live in
# scripts/deploy-server.sh. The frontend deploys separately on Vercel.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   AWS_DEPLOY_ROLE_ARN  IAM role assumed via OIDC (SendCommand on the instance)
#   EC2_INSTANCE_ID      target instance id (i-…)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write # mint the OIDC token for AWS
  contents: read

jobs:
  deploy:
    name: Deploy backend via SSM
    runs-on: ubuntu-latest
    # Manual run, or only when the triggering CI run passed.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Send deploy command
        id: send
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "deploy main (${{ github.sha }})" \
            --parameters '{
              "executionTimeout": ["900"],
              "commands": [
                "set -e",
                "PREV=$(sudo -u ubuntu git -C /home/ubuntu/founder-os rev-parse HEAD)",
                "sudo -u ubuntu git -C /home/ubuntu/founder-os fetch -q origin main",
                "sudo -u ubuntu git -C /home/ubuntu/founder-os checkout -q main",
                "sudo -u ubuntu git -C /home/ubuntu/founder-os reset -q --hard origin/main",
                "bash /home/ubuntu/founder-os/scripts/deploy-server.sh \"$PREV\""
              ]
            }' \
            --query 'Command.CommandId' --output text)
          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for result
        run: |
          CMD_ID='${{ steps.send.outputs.cmd_id }}'
          IID='${{ secrets.EC2_INSTANCE_ID }}'
          STATUS=Pending
          # Poll up to 15 min — pip installs can be slow on a t3.small.
          for _ in $(seq 1 90); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" \
              --instance-id "$IID" --query Status --output text 2>/dev/null || echo Pending)
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut|Undeliverable|Terminated) break ;;
            esac
            sleep 10
          done
          echo "── server output ──"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$IID" \
            --query StandardOutputContent --output text
          echo "── server errors ──"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$IID" \
            --query StandardErrorContent --output text
          if [ "$STATUS" != "Success" ]; then
            echo "Deploy status: $STATUS"
            exit 1
          fi

      - name: Public health check
        run: |
          curl -fsS -o /dev/null --retry 3 --retry-delay 5 \
            -w "https://founderos.duckdns.org -> %{http_code}\n" \
            https://founderos.duckdns.org/
